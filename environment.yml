# DETLAB_rn conda environment
#
# This file describes the recommended training/evaluation environment for the
# unified project entry points:
#
#   python run_train_experiment.py ...
#   python run_predict_experiment_all.py ...
#
# Create:
#   conda env create -f environment.yml
#
# Update an existing environment after this file changes:
#   conda env update -n detlab_py39 -f environment.yml --prune
#
# Activate:
#   conda activate detlab_py39
#
# Quick checks:
#   python -c "import torch; print(torch.__version__, torch.version.cuda, torch.cuda.is_available())"
#   python -c "from pycocotools.coco import COCO; import cv2; print('ok')"
#
# Notes:
# - The pinned PyTorch stack below targets CUDA 12.4 runtime via conda
#   `pytorch-cuda=12.4`. The NVIDIA driver on the machine must be new enough
#   for CUDA 12.x.
# - If the server already has a working environment, treat this file as the
#   reproducible reference rather than forcing a rebuild.
# - `tensorboard` is useful for logs but the training scripts are designed to
#   continue even if TensorBoard import fails.
name: detlab_py39
channels:
  # PyTorch official channel for torch/vision/audio packages.
  - pytorch
  # NVIDIA channel for the CUDA runtime package used by PyTorch.
  - nvidia
  # General scientific Python packages.
  - conda-forge
dependencies:
  # Python version used by current training scripts and server experiments.
  - python=3.9
  - pip=24.2

  # Core deep learning stack.
  # Keep pytorch/torchvision/torchaudio versions aligned.
  - pytorch=2.4.1
  - torchvision=0.19.1
  - torchaudio=2.4.1
  - pytorch-cuda=12.4

  # Numerical and plotting dependencies used by datasets, losses, callbacks,
  # metric visualization and PR/ROC tools.
  - numpy=1.26.4
  - scipy=1.11.4
  - matplotlib=3.7.5
  - pillow=10.4.0
  - pyyaml=6.0.2
  - tqdm=4.66.5

  # Required by pycocotools build/install in some environments.
  - cython=3.0.11

  - pip:
      # Image IO and augmentation. Used by dataset loaders, prediction
      # visualization and legacy video utilities.
      - opencv-python==4.10.0.84

      # COCO metric evaluation. Required for training-time mAP and
      # run_predict_experiment_all.py evaluation.
      - pycocotools==2.0.7

      # Optional logging support used by utils.callbacks.LossHistory.
      - tensorboard==2.15.2
      - protobuf==4.25.3

      # Model blocks / profiling helpers used by sequence and custom networks.
      - einops==0.8.0
      - ml-collections==0.1.1
      - timm==1.0.9
      - thop==0.1.1.post2209072238

      # Extra image processing helpers used by tools and some legacy scripts.
      - scikit-image==0.21.0
      - imageio==2.35.1
